risk: Reconciliation writes to the graph (sole write-path). Matching is heuristic (type aliases, 250km,
  window+7d grace); wrong links overstate model accuracy. Kept the matching pure/tested and the candidate
  query bounded (LIMIT 500).
budget:
  tokens: 30000
  subagents: 0
decisions:
- when: '2026-07-14'
  what: Reconciliation runs inside the graph-processor on realized-event ingestion; the matching logic
    is a pure module (reconciliation.py) injected into the consumer.
  why: The graph-processor is the sole writer to the stores; keeping matching pure makes it deterministic
    and testable without Memgraph.
- when: '2026-07-14'
  what: Match on a predicted->realized TYPE_ALIASES family, distance <= 250km (region-equality fallback
    when coords absent), and realization within [generated_at, +timeframe_max+7d].
  why: Reasonable first-cut heuristics; all thresholds are constants that can be tuned. A per-prediction
    rate/threshold can be threaded later.
- when: '2026-07-14'
  what: Included the mda.interdictions.new -> :Event ingestion (previously a TODO) as the realized-event
    source this loop reconciles against.
  why: Reconciliation needs a realized-event stream; interdictions are the natural first source for INTERDICTION_OPERATION
    predictions.
attempts:
- when: '2026-07-14'
  approach: Added processors/graph/reconciliation.py (haversine, type_matches, match_prediction, build_interdiction_event_cypher,
    build_realized_by_cypher); wired graph_consumer to upsert interdictions and link matching open predictions
    via :REALIZED_BY; added schema indexes and a realized flag on the predictions API.
  outcome: worked
  note: ruff clean; unit gate 129 passed / 1 skipped (+17 tests). A matching realized event links its
    prediction and marks it realized; type/spatial/temporal mismatches do not link.
questions: []
