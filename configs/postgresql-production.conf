# PostgreSQL 16 — Production tuning for MDA
# Target: Mac mini M-series, 64 GB RAM, 1 TB SSD
# Optimized for mixed OLTP (AIS inserts) + OLAP (spatial queries)

# ---- Connection ----
max_connections = 200
superuser_reserved_connections = 3

# ---- Memory ----
shared_buffers = 16GB              # 25% of 64GB
effective_cache_size = 48GB        # 75% of 64GB
work_mem = 512MB                   # Per-operation sort memory (spatial joins)
maintenance_work_mem = 4GB         # VACUUM, CREATE INDEX, etc.
huge_pages = try

# ---- WAL / Checkpoints ----
wal_level = replica
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_completion_target = 0.9
wal_compression = zstd
wal_buffers = 64MB

# ---- Planner ----
random_page_cost = 1.1             # SSD storage
effective_io_concurrency = 200     # NVMe
default_statistics_target = 500    # Better spatial query plans
jit = on                           # JIT compilation for complex queries

# ---- Parallelism ----
max_worker_processes = 16
max_parallel_workers = 12
max_parallel_workers_per_gather = 6
max_parallel_maintenance_workers = 4

# ---- PostGIS-specific ----
# Increase geometry cache for large EEZ polygons
# postgis.gdal_enabled_drivers = 'ENABLE_ALL'

# ---- Logging ----
log_min_duration_statement = 1000  # Log queries > 1s
log_checkpoints = on
log_lock_waits = on
log_temp_files = 10240             # Log temp files > 10MB
log_autovacuum_min_duration = 1000

# ---- Autovacuum (tuned for high-volume AIS inserts) ----
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 5ms
