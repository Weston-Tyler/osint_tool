# Memgraph — Production configuration
# Target: Mac mini M-series, 64 GB RAM

--log-level=WARNING

# ---- Storage ----
--storage-properties-on-edges=true
--storage-wal-enabled=true
--storage-snapshot-interval-sec=600
--storage-snapshot-retention-count=5
--storage-wal-file-size-kib=131072
--storage-recover-on-startup=true

# ---- Memory ----
# Reserve ~48GB for Memgraph (rest for OS + other services)
# Comment out if running in Docker with memory limits
# --memory-limit=49152

# ---- Query ----
--query-execution-timeout-sec=120
--query-max-plans=1000

# ---- Bolt ----
--bolt-num-workers=32
--bolt-session-inactivity-timeout=1800

# ---- Replication (future multi-node) ----
# --replication-restore-state-on-startup=true

# ---- Telemetry ----
--telemetry-enabled=false
