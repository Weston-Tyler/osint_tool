apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: mda
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: apache/age:PG16
          ports:
            - containerPort: 5432
              name: pg
          env:
            - name: POSTGRES_DB
              value: mda
            - name: POSTGRES_USER
              value: mda
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mda-secrets
                  key: postgres-password
          args:
            - postgres
            - -c
            - shared_preload_libraries=age
            - -c
            - max_connections=200
            - -c
            - shared_buffers=8GB
            - -c
            - effective_cache_size=24GB
            - -c
            - work_mem=256MB
            - -c
            - wal_level=replica
            - -c
            - max_wal_size=4GB
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
            limits:
              memory: "24Gi"
              cpu: "8"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mda
                - -d
                - mda
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mda
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: pg
