# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:

  # ---- Reverse Proxy (TLS termination) ----
  traefik:
    image: traefik:v3.0
    container_name: mda-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8082:8082"   # Prometheus metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/certs
    networks:
      - mda-net

  # ---- Keycloak (OAuth2/OIDC) ----
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: mda-keycloak
    restart: unless-stopped
    command: start-dev --http-port=8443 --import-realm
    ports:
      - "8443:8443"
    volumes:
      - ./configs/keycloak/mda-realm.json:/opt/keycloak/data/import/mda-realm.json:ro
      - keycloak-data:/opt/keycloak/data
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN_USER:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: mda
      KC_DB_PASSWORD: "${POSTGRES_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mda-net

  # ---- ES Sync Service ----
  es-sync:
    build:
      context: ./services/es-sync
      dockerfile: ../entity-resolution/Dockerfile
    container_name: mda-es-sync
    restart: unless-stopped
    command: ["python", "-u", "/app/es_sync.py"]
    volumes:
      - ./services/es-sync:/app:ro
    environment:
      MEMGRAPH_HOST: memgraph
      MEMGRAPH_PORT: "7687"
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      - memgraph
      - elasticsearch
    networks:
      - mda-net

  # ---- Production API overrides ----
  api:
    environment:
      AUTH_ENABLED: "true"
      KEYCLOAK_URL: http://keycloak:8443
      KEYCLOAK_REALM: mda
      CORS_ORIGINS: "https://mda.local,https://localhost"
      LOG_LEVEL: WARNING
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4"
          memory: 4G

  # ---- Production Memgraph overrides ----
  memgraph:
    deploy:
      resources:
        limits:
          cpus: "16"
          memory: 48G

  # ---- Production Elasticsearch overrides ----
  elasticsearch:
    environment:
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      ELASTIC_PASSWORD: "${ELASTIC_PASSWORD}"

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mda-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - mda-net

volumes:
  traefik-certs:
  keycloak-data:
  prometheus-data:
