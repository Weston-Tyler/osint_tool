name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: python
          package-name: mda-osint-db
          changelog-path: CHANGELOG.md

  # ── Build and push Docker images on release ────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - workers/ais
          - workers/gdelt
          - workers/sanctions
          - workers/corporate/gleif
          - services/corporate/ownership_api
          - worldfish
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract service name
        id: name
        run: |
          SERVICE_NAME=$(echo "${{ matrix.service }}" | tr '/' '-')
          echo "name=$SERVICE_NAME" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ steps.name.outputs.name }}:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/${{ github.repository }}/${{ steps.name.outputs.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
