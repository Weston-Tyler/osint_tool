name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read
  checks: write

jobs:

  # ── Conventional commit PR title ────────────────────────────
  title-check:
    name: PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            api
            workers
            services
            worldfish
            corporate
            causal
            gdelt
            docker
            k8s
            schema
            ci
            docs
            deps
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Subjects should start with lowercase.

  # ── PR size check ───────────────────────────────────────────
  size-check:
    name: PR Size
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute diff size
        id: size
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          ADDED=$(git diff --shortstat "$BASE..$HEAD" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          DELETED=$(git diff --shortstat "$BASE..$HEAD" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")
          TOTAL=$((ADDED + DELETED))
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$TOTAL" -gt 5000 ]; then
            echo "::warning::Very large PR: $TOTAL lines changed. Consider splitting."
          elif [ "$TOTAL" -gt 2000 ]; then
            echo "::notice::Large PR: $TOTAL lines changed."
          fi

  # ── Auto-label based on paths changed ───────────────────────
  labeler:
    name: Auto-label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  # ── Check for secrets in diff ───────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Check no merge commits on feature branches ──────────────
  merge-check:
    name: No merge commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for merge commits
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          MERGES=$(git log --merges "$BASE..$HEAD" | wc -l)
          if [ "$MERGES" -gt 0 ]; then
            echo "::warning::PR contains merge commits — consider rebasing"
          fi
