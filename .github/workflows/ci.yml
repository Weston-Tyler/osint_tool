name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check . --output-format=github

  # ── 2. Unit Tests ────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install pytest pydantic kafka-python requests spacy \
            numpy pandas statsmodels
          # gqlalchemy requires libmgclient (C lib) — mock it for tests
          # that import it so unit tests can run without Memgraph
          mkdir -p /tmp/stubs
          echo "class Memgraph: pass" > /tmp/stubs/gqlalchemy.py
          echo "PYTHONPATH=/tmp/stubs:\$PYTHONPATH" >> $GITHUB_ENV
      - name: Run unit tests
        run: |
          PYTHONPATH="/tmp/stubs:$PYTHONPATH" \
          python -m pytest tests/unit/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results.xml

  # ── 3. Docker Build Verification ─────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - workers/ais
          - workers/gdelt
          - workers/sanctions
          - workers/uas
          - workers/acled
          - workers/economic
          - workers/financial
          - workers/humanitarian
          - workers/geospatial
          - workers/maritime
          - workers/crypto
          - processors/graph
          - services/nlp
          - services/causal_extractor
          - services/causal_graph_learner
          - worldfish
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Build Docker image
        if: steps.check.outputs.exists == 'true'
        run: docker build -t mda-${{ matrix.service }} ${{ matrix.service }}

  # ── 4. Schema Validation ─────────────────────────────────────
  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Cypher syntax (basic)
        run: |
          echo "Checking Cypher files..."
          for f in schema/graph/*.cypher scripts/*.cypher; do
            [ -f "$f" ] || continue
            echo "  Checking $f"
            if grep -Pn 'CREATE\s*;' "$f"; then
              echo "  ERROR: Empty CREATE in $f"
              exit 1
            fi
          done
          echo "  All Cypher files passed"

      - name: Validate SQL syntax (basic)
        run: |
          echo "Checking SQL files..."
          for f in schema/relational/*.sql; do
            echo "  Checking $f"
            if ! grep -q 'CREATE' "$f"; then
              echo "  WARNING: No CREATE statements in $f"
            fi
          done
          echo "  All SQL files checked"

      - name: Validate JSON configs
        run: |
          echo "Checking JSON files..."
          find . -name "*.json" -not -path './.git/*' | while read f; do
            if ! python3 -c "import json; json.load(open('$f'))"; then
              echo "  ERROR: Invalid JSON in $f"
              exit 1
            fi
          done
          echo "  All JSON files valid"

      - name: Validate YAML configs
        run: |
          pip install pyyaml
          echo "Checking YAML files..."
          YAML_FAIL=0
          find . \( -name "*.yml" -o -name "*.yaml" \) -not -path './.git/*' | while read f; do
            if ! python3 -c "
import yaml, sys
with open('$f') as fh:
    try:
        list(yaml.safe_load_all(fh))
    except yaml.YAMLError as e:
        print(f'ERROR: $f: {e}', file=sys.stderr)
        sys.exit(1)
"; then
              echo "  FAIL: $f"
              YAML_FAIL=1
            fi
          done
          echo "  All YAML files valid"

  # ── 5. Docker Compose Validation ─────────────────────────────
  compose-validation:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test
      MINIO_ROOT_PASSWORD: test
      ELASTIC_PASSWORD: test
      GRAFANA_ADMIN_PASSWORD: test
      GEOSERVER_ADMIN_PASSWORD: test
      API_SECRET_KEY: test
    steps:
      - uses: actions/checkout@v4
      - name: Validate base compose
        run: docker compose -f docker-compose.yml config > /dev/null
      - name: Validate causal compose
        run: docker compose -f docker-compose.yml -f docker-compose.causal.yml config > /dev/null
      - name: Validate datasets compose
        run: docker compose -f docker-compose.yml -f docker-compose.datasets.yml config > /dev/null
      - name: Validate GDELT compose
        run: docker compose -f docker-compose.yml -f docker-compose.gdelt.yml config > /dev/null
