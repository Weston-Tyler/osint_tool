name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check . || echo "::warning::Code would be reformatted"

  # ── 2. Unit Tests (matrix) ───────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install test dependencies and stubs
        run: |
          pip install pytest pytest-cov pydantic kafka-python requests \
            spacy numpy pandas statsmodels
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          python -c "
          import os, pathlib
          site = '$SITE'
          os.makedirs(f'{site}/gqlalchemy', exist_ok=True)
          pathlib.Path(f'{site}/gqlalchemy/__init__.py').write_text('''
          class Memgraph:
              def __init__(self, *a, **kw): pass
              def execute(self, *a, **kw): pass
              def execute_and_fetch(self, *a, **kw): return []
          ''')
          pathlib.Path(f'{site}/ollama.py').write_text('''
          class Client:
              def __init__(self, *a, **kw): pass
              def generate(self, *a, **kw): return {\"response\": \"{}\"}
          ''')
          os.makedirs(f'{site}/mesa/time', exist_ok=True)
          pathlib.Path(f'{site}/mesa/__init__.py').write_text('''
          class Agent:
              def __init__(self, unique_id, model):
                  self.unique_id = unique_id
                  self.model = model
          class Model:
              def __init__(self): pass
          class DataCollector:
              def __init__(self, **kw): pass
              def collect(self, m): pass
              def get_model_vars_dataframe(self):
                  import pandas
                  return pandas.DataFrame()
          ''')
          pathlib.Path(f'{site}/mesa/time/__init__.py').write_text('''
          class RandomActivation:
              def __init__(self, model):
                  self.agents = []
                  self.steps = 0
              def add(self, agent): self.agents.append(agent)
              def step(self): self.steps += 1
          ''')
          "
      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --junitxml=test-results-${{ matrix.python }}.xml \
            --cov=api --cov=workers --cov=services --cov=processors --cov=worldfish \
            --cov-report=xml:coverage-${{ matrix.python }}.xml \
            --cov-report=term-missing \
            || true
          python -m pytest tests/unit/ --tb=line
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python }}
          path: |
            test-results-${{ matrix.python }}.xml
            coverage-${{ matrix.python }}.xml
      - name: Upload coverage to step summary
        if: matrix.python == '3.12' && always()
        run: |
          if [ -f coverage-3.12.xml ]; then
            echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "See artifact for full details" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 3. Docker Build Matrix ───────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - workers/ais
          - workers/gdelt
          - workers/sanctions
          - workers/uas
          - workers/acled
          - workers/economic
          - workers/financial
          - workers/humanitarian
          - workers/geospatial
          - workers/maritime
          - workers/crypto
          - workers/corporate/gleif
          - workers/corporate/companies_house
          - workers/corporate/icij
          - workers/corporate/opensanctions_ftm
          - workers/corporate/sec_edgar
          - workers/corporate/registry_collector
          - processors/graph
          - services/nlp
          - services/causal_extractor
          - services/causal_graph_learner
          - services/corporate/ownership_api
          - worldfish
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (with cache)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}
          push: false
          tags: mda-test:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
        continue-on-error: false

  # ── 4. Schema + Config Validation ────────────────────────────
  validate:
    name: Schema & Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          FAIL=0
          while IFS= read -r f; do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done < <(find . -name "*.json" -not -path './.git/*' -not -path '*/node_modules/*')
          exit $FAIL
      - name: Validate YAML
        run: |
          pip install -q pyyaml
          FAIL=0
          while IFS= read -r f; do
            if ! python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" 2>/dev/null; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done < <(find . \( -name "*.yml" -o -name "*.yaml" \) -not -path './.git/*' -not -path '*/node_modules/*')
          exit $FAIL
      - name: Validate Cypher files
        run: |
          for f in schema/graph/*.cypher scripts/*.cypher; do
            [ -f "$f" ] || continue
            # Basic sanity: balanced parens, no empty CREATE
            if grep -Pn 'CREATE\s*;' "$f"; then
              echo "ERROR: Empty CREATE in $f"
              exit 1
            fi
          done
      - name: Validate Turtle ontology
        run: |
          pip install -q rdflib
          for f in ontology/*.ttl; do
            [ -f "$f" ] || continue
            python3 -c "
          from rdflib import Graph
          g = Graph()
          g.parse('$f', format='turtle')
          print(f'$f: {len(g)} triples OK')
          "
          done

  # ── 5. Docker Compose Validation ─────────────────────────────
  compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test
      MINIO_ROOT_PASSWORD: test
      ELASTIC_PASSWORD: test
      GRAFANA_ADMIN_PASSWORD: test
      GEOSERVER_ADMIN_PASSWORD: test
      API_SECRET_KEY: test
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.causal.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.datasets.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.gdelt.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.corporate.yml config > /dev/null

  # ── 6. Image Manifest Validation ─────────────────────────────
  image-manifests:
    name: Image Manifest Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all compose images exist on registries
        run: |
          set -e
          IMAGES=$(grep -h "^\s*image:" docker-compose*.yml \
            | sed 's/^\s*image:\s*//' \
            | tr -d '"' \
            | sort -u)

          FAIL=0
          FAILED_IMAGES=""
          for img in $IMAGES; do
            [ -z "$img" ] && continue
            printf "  %-65s " "$img"
            if docker manifest inspect "$img" > /dev/null 2>&1; then
              echo "OK"
            else
              echo "FAIL"
              FAIL=1
              FAILED_IMAGES="${FAILED_IMAGES}\n  - $img"
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "::error::The following image tags cannot be pulled:"
            echo -e "$FAILED_IMAGES"
            exit 1
          fi

  # ── 7. Shell Script Validation ───────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq shellcheck
          find . -name "*.sh" -not -path './.git/*' -print0 | \
            xargs -0 shellcheck --severity=warning --exclude=SC1091,SC2086 || true

  # ── 8. Dockerfile Linting ────────────────────────────────────
  hadolint:
    name: Dockerfile Linting (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3009,DL3013,DL3015,DL3018,DL3059,DL3042
          failure-threshold: error

  # ── 9. Summary ───────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, docker-build, validate, compose, image-manifests]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Schema Validation | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compose Validation | ${{ needs.compose.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Manifests | ${{ needs.image-manifests.result }} |" >> $GITHUB_STEP_SUMMARY
