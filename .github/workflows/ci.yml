name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check . --output-format=github

  # ── 2. Unit Tests ────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install pytest pydantic kafka-python requests spacy numpy pandas statsmodels
          # Stub out gqlalchemy (needs C lib that can't compile here)
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          mkdir -p "$SITE/gqlalchemy"
          cat > "$SITE/gqlalchemy/__init__.py" << 'STUB'
          class Memgraph:
              def __init__(self, *a, **kw): pass
              def execute(self, *a, **kw): pass
              def execute_and_fetch(self, *a, **kw): return []
          STUB
          # Stub out ollama
          cat > "$SITE/ollama.py" << 'STUB'
          class Client:
              def __init__(self, *a, **kw): pass
              def generate(self, *a, **kw): return {"response": "{}"}
          STUB
          # Stub out mesa
          mkdir -p "$SITE/mesa"
          cat > "$SITE/mesa/__init__.py" << 'STUB'
          class Agent:
              def __init__(self, unique_id, model): self.unique_id = unique_id; self.model = model
          class Model:
              def __init__(self): pass
          class DataCollector:
              def __init__(self, **kw): pass
              def collect(self, m): pass
              def get_model_vars_dataframe(self): import pandas; return pandas.DataFrame()
          STUB
          mkdir -p "$SITE/mesa/time"
          cat > "$SITE/mesa/time/__init__.py" << 'STUB'
          class RandomActivation:
              def __init__(self, model): self.agents = []; self.steps = 0
              def add(self, agent): self.agents.append(agent)
              def step(self): self.steps += 1
          STUB
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results.xml

  # ── 3. Docker Build ──────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - workers/ais
          - workers/gdelt
          - workers/sanctions
          - workers/uas
          - workers/acled
          - workers/economic
          - workers/financial
          - workers/humanitarian
          - workers/geospatial
          - workers/maritime
          - workers/crypto
          - processors/graph
          - services/nlp
          - services/causal_extractor
          - services/causal_graph_learner
          - worldfish
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Build Docker image
        if: steps.check.outputs.exists == 'true'
        run: docker build -t mda-test ${{ matrix.service }}

  # ── 4. Schema + Config Validation ────────────────────────────
  validate:
    name: Schema & Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          FAIL=0
          find . -name "*.json" -not -path './.git/*' | while read f; do
            python3 -c "import json; json.load(open('$f'))" 2>/dev/null || { echo "FAIL: $f"; FAIL=1; }
          done
          exit $FAIL
      - name: Validate YAML files
        run: |
          pip install pyyaml -q
          find . \( -name "*.yml" -o -name "*.yaml" \) -not -path './.git/*' | while read f; do
            python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" 2>/dev/null || { echo "FAIL: $f"; exit 1; }
          done

  # ── 5. Docker Compose Validation ─────────────────────────────
  compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test
      MINIO_ROOT_PASSWORD: test
      ELASTIC_PASSWORD: test
      GRAFANA_ADMIN_PASSWORD: test
      GEOSERVER_ADMIN_PASSWORD: test
      API_SECRET_KEY: test
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.causal.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.datasets.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.gdelt.yml config > /dev/null
