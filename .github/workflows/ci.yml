name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check . --output-format=github

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps and stubs
        run: |
          pip install pytest pydantic kafka-python requests spacy numpy pandas statsmodels
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          python -c "
          import os, pathlib
          site = '$SITE'
          # gqlalchemy stub
          os.makedirs(f'{site}/gqlalchemy', exist_ok=True)
          pathlib.Path(f'{site}/gqlalchemy/__init__.py').write_text('''
          class Memgraph:
              def __init__(self, *a, **kw): pass
              def execute(self, *a, **kw): pass
              def execute_and_fetch(self, *a, **kw): return []
          ''')
          # ollama stub
          pathlib.Path(f'{site}/ollama.py').write_text('''
          class Client:
              def __init__(self, *a, **kw): pass
              def generate(self, *a, **kw): return {\"response\": \"{}\"}
          ''')
          # mesa stub
          os.makedirs(f'{site}/mesa/time', exist_ok=True)
          pathlib.Path(f'{site}/mesa/__init__.py').write_text('''
          class Agent:
              def __init__(self, unique_id, model):
                  self.unique_id = unique_id
                  self.model = model
          class Model:
              def __init__(self): pass
          class DataCollector:
              def __init__(self, **kw): pass
              def collect(self, m): pass
              def get_model_vars_dataframe(self):
                  import pandas
                  return pandas.DataFrame()
          ''')
          pathlib.Path(f'{site}/mesa/time/__init__.py').write_text('''
          class RandomActivation:
              def __init__(self, model):
                  self.agents = []
                  self.steps = 0
              def add(self, agent): self.agents.append(agent)
              def step(self): self.steps += 1
          ''')
          print('Stubs installed to', site)
          "
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results.xml

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - workers/ais
          - workers/gdelt
          - workers/sanctions
          - workers/uas
          - workers/acled
          - workers/economic
          - workers/financial
          - workers/humanitarian
          - workers/geospatial
          - workers/maritime
          - workers/crypto
          - processors/graph
          - services/nlp
          - services/causal_extractor
          - services/causal_graph_learner
          - worldfish
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            docker build -t mda-test ${{ matrix.service }}
          else
            echo "No Dockerfile — skipping"
          fi

  validate:
    name: Schema & Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          find . -name "*.json" -not -path './.git/*' -exec python3 -c "import json,sys; json.load(open(sys.argv[1]))" {} \;
      - name: Validate YAML
        run: |
          pip install -q pyyaml
          find . \( -name "*.yml" -o -name "*.yaml" \) -not -path './.git/*' -exec python3 -c "import yaml,sys; list(yaml.safe_load_all(open(sys.argv[1])))" {} \;

  compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: test
      MINIO_ROOT_PASSWORD: test
      ELASTIC_PASSWORD: test
      GRAFANA_ADMIN_PASSWORD: test
      GEOSERVER_ADMIN_PASSWORD: test
      API_SECRET_KEY: test
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.causal.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.datasets.yml config > /dev/null
      - run: docker compose -f docker-compose.yml -f docker-compose.gdelt.yml config > /dev/null
