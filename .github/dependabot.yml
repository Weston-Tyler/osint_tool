version: 2

# Conservative Dependabot config:
# - Monthly (not weekly) to reduce noise
# - Strict per-ecosystem PR limits (max 2-3)
# - Minor/patch updates grouped together per directory
# - Major updates paused (allow manually via workflow_dispatch on CI)
# - Single root pip entry covers common deps; per-service entries removed
#   to avoid 12+ directories firing simultaneously

updates:
  # ── Python root ──────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-all:
        applies-to: version-updates
        update-types: ["minor", "patch"]
    ignore:
      # Ignore major version bumps globally — review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── API service (has its own requirements.txt) ───────────
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels: ["dependencies", "python", "api"]
    groups:
      api-all:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Docker base images (covers all Dockerfiles) ──────────
  - package-ecosystem: "docker"
    directory: "/api"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]
    groups:
      docker-all:
        update-types: ["minor", "patch"]

  # ── GitHub Actions ───────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-all:
        update-types: ["minor", "patch", "major"]
