name: Bug Report
description: Report a bug in the MDA OSINT system
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: dropdown
    id: component
    attributes:
      label: Which component is affected?
      multiple: false
      options:
        - API (FastAPI)
        - Graph database (Memgraph)
        - Relational database (PostgreSQL/PostGIS)
        - Data ingester (specify in description)
        - Causal chain engine
        - WorldFish simulation
        - Corporate ownership graph
        - Docker Compose / deployment
        - GitHub Actions / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what the bug is
      placeholder: When I ran X, Y happened instead of Z
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact commands/clicks to reproduce
      placeholder: |
        1. `docker compose up -d`
        2. `curl localhost:8000/v1/vessels`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - GitHub Codespaces
        - Local (Mac mini)
        - Local (Linux)
        - k3s cluster
        - Other
    validations:
      required: true
